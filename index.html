<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Food Menu</title>

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #f5f5f5;
}

.menu-container {
  display: flex;
  max-width: 900px;
  margin: 40px auto;
  background: #fff;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

/* SLIDESHOW */
.menu-image {
  width: 400px;
  height: 500px;
  overflow: hidden;
}

.menu-image img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: opacity 1s ease-in-out;
}

/* MENU */
.menu-content {
  padding: 30px;
  width: 100%;
  background: #f3e7d3;
}

.menu-content h1 {
  text-align: center;
  font-family: cursive;
}

.menu-content ul {
  list-style: none;
  padding: 0;
}

.menu-content li {
  display: flex;
  justify-content: space-between;
  padding: 10px 0;
  border-bottom: 1px dashed #aaa;
}

.price {
  font-weight: bold;
}
</style>

</head>
<body>

<div class="menu-container">

  <!-- ✅ SINGLE IMAGE (SLIDESHOW) -->
  <div class="menu-image">
    <img id="slideshow-img" src="">
  </div>

  <!-- MENU -->
  <div class="menu-content">
    <h1>Snacks</h1>
    <ul id="menu-list"></ul>
  </div>

</div>

<script>

/* MENU ITEMS */
const menuItems = [
  { name: "Cheese Burger", price: 85 },
  { name: "French Fries", price: 80 },
  { name: "Pav Bhaji", price: 90 },
  { name: "Veg Samosa", price: 80 },
  { name: "Crispy Chilli Potato", price: 120 },
  { name: "Veg Crispy", price: 110 },
  { name: "Honey Chilli Potato", price: 130 },
  { name: "Indian street food", price: 170 }
];

/* ADD MENU */
const menuList = document.getElementById("menu-list");
menuItems.forEach(item => {
  const li = document.createElement("li");
  li.innerHTML = `<span>${item.name}</span><span class="price">₹${item.price}</span>`;
  menuList.appendChild(li);
});

/* WORKING IMAGES (ALL ITEMS) */
const images = [
   "https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=800", // Cheese Burger
    "https://images.unsplash.com/photo-1576107232684-1279f390859f?w=800", // French Fries
    "https://images.unsplash.com/photo-1601050690597-df0568f70950?w=800", // Samosa
   "https://images.unsplash.com/photo-1598515214211-89d3c73ae83b?w=800", // spicy mushrooms
   "https://images.unsplash.com/photo-1631452180519-c014fe946bc7?w=800", // Indian street food (similar)
];

let index = 0;
const img = document.getElementById("slideshow-img");

/* FIRST IMAGE */
img.src = images[0];

/* SLIDESHOW */
function changeImage() {
  img.style.opacity = 0;

  setTimeout(() => {
    index = (index + 1) % images.length;
    img.src = images[index];
    img.style.opacity = 1;
  }, 500);
}

setInterval(changeImage, 3000);

</script>

</body>
</html>
